#cloud-config

package_update: true
package_upgrade: true

packages:
- nginx
- mysql-server
- git
- unzip
- curl
- software-properties-common

write_files:
- path: /etc/nginx/sites-available/moodle
  content: |
    server {
        listen 80;
        server_name ${duckdns_domain}.duckdns.org;
        root /var/www/moodle;
        index index.php;

        client_max_body_size 100M;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ ^(.+\.php)(.*)$ {
            fastcgi_split_path_info ^(.+\.php)(.*)$;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~ /\.ht {
            deny all;
        }
    }

- path: /opt/update-duckdns.sh
  permissions: '0755'
  content: |
    #!/bin/bash
    PUBLIC_IP=$(curl -s https://api.ipify.org)
    curl -s "https://www.duckdns.org/update?domains=${duckdns_domain}&token=${duckdns_token}&ip=$PUBLIC_IP"
    echo "DuckDNS actualizado con IP: $PUBLIC_IP"

- path: /etc/systemd/system/duckdns.service
  content: |
    [Unit]
    Description=Update DuckDNS on boot
    After=network-online.target
    Wants=network-online.target

    [Service]
    Type=oneshot
    ExecStart=/opt/update-duckdns.sh

    [Install]
    WantedBy=multi-user.target

runcmd:
# Agregar repositorio PHP de Ondrej
- apt-get install -y software-properties-common
- add-apt-repository ppa:ondrej/php -y
- apt-get update

# Instalar PHP 8.3 y extensiones
- apt-get install -y php8.3 php8.3-fpm php8.3-mysql php8.3-xml php8.3-mbstring php8.3-curl php8.3-zip php8.3-gd php8.3-intl php8.3-soap php8.3-opcache php8.3-xmlrpc

# Configurar Nginx
- ln -sf /etc/nginx/sites-available/moodle /etc/nginx/sites-enabled/moodle
- rm -f /etc/nginx/sites-enabled/default
- nginx -t
- systemctl enable nginx
- systemctl restart nginx

# Configurar PHP-FPM
- systemctl enable php8.3-fpm
- systemctl restart php8.3-fpm

# Configurar MySQL
- systemctl enable mysql
- systemctl start mysql

# Activar DuckDNS
- systemctl daemon-reload
- systemctl enable duckdns
- systemctl start duckdns
- sleep 15

# Clonar Moodle
- git clone --depth=1 --branch MOODLE_405_STABLE https://github.com/moodle/moodle.git /var/www/moodle

# Crear moodledata
- mkdir -p /var/moodledata
- chown -R www-data:www-data /var/moodledata
- chmod -R 777 /var/moodledata
- chown -R www-data:www-data /var/www/moodle
- chmod -R 755 /var/www/moodle

# Configurar MySQL
- mysql -u root -e "CREATE DATABASE IF NOT EXISTS moodle DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
- mysql -u root -e "CREATE USER IF NOT EXISTS 'moodleuser'@'localhost' IDENTIFIED BY 'MoodlePass2026!';"
- mysql -u root -e "GRANT ALL PRIVILEGES ON moodle.* TO 'moodleuser'@'localhost';"
- mysql -u root -e "FLUSH PRIVILEGES;"

# Instalar Moodle via CLI
- >-
  /usr/bin/php8.3 /var/www/moodle/admin/cli/install.php --wwwroot="http://${duckdns_domain}.duckdns.org" --dataroot=/var/moodledata --dbtype=mysqli --dbhost=localhost --dbname=moodle --dbuser=moodleuser --dbpass=MoodlePass2026! --adminuser=admin --adminpass=MoodlelabAdmin2026! --adminemail=admin@moodlelab.local --fullname="Moodlelab Staging" --shortname="moodlelab" --non-interactive --agree-license

# Permisos finales
- chown -R www-data:www-data /var/www/moodle
- chmod -R 755 /var/www/moodle

# Reiniciar Nginx
- systemctl restart nginx
