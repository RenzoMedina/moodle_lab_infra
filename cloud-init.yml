#cloud-config
package_update: true
package_upgrade: true

packages:
- nginx
- mysql-server
- php8.3
- php8.3-fpm
- php8.3-mysql
- php8.3-xml
- php8.3-mbstring
- php8.3-curl
- php8.3-zip
- php8.3-gd
- php8.3-intl
- php8.3-soap
- php8.3-xmlrpc
- php8.3-opcache
- git
- unzip
- curl

write_files:
# Configuración de Nginx para Moodle
- path: /etc/nginx/sites-available/moodle
  content: |
    server {
        listen 80;
        server_name ${duckdns_domain}.duckdns.org;
        root /var/www/moodle;
        index index.php;

        client_max_body_size 100M;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ ^(.+\.php)(.*)$ {
            fastcgi_split_path_info ^(.+\.php)(.*)$;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~ /\.ht {
            deny all;
        }
    }

# Script de instalación de Moodle
- path: /opt/install-moodle.sh
  permissions: '0755'
  content: |
    #!/bin/bash
    set -e

    MOODLE_VERSION="MOODLE_405_STABLE"
    MOODLE_DIR="/var/www/moodle"
    MOODLE_DATA="/var/moodledata"
    DB_NAME="moodle"
    DB_USER="moodleuser"
    DB_PASS="MoodlePass2026!"
    ADMIN_USER="admin"
    ADMIN_PASS="MoodleAdmin2026!"
    ADMIN_EMAIL="admin@moodlelab.local"
    DUCKDNS_DOMAIN="${duckdns_domain}"

    echo ">>> Clonando Moodle $MOODLE_VERSION..."
    git clone --depth=1 --branch $MOODLE_VERSION \
      https://github.com/moodle/moodle.git $MOODLE_DIR

    echo ">>> Creando directorio moodledata..."
    mkdir -p $MOODLE_DATA
    chown -R www-data:www-data $MOODLE_DATA
    chmod -R 777 $MOODLE_DATA

    chown -R www-data:www-data $MOODLE_DIR
    chmod -R 755 $MOODLE_DIR

    echo ">>> Configurando MySQL..."
    mysql -u root <<EOF
    CREATE DATABASE IF NOT EXISTS $DB_NAME DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE USER IF NOT EXISTS '$DB_USER'@'localhost' IDENTIFIED BY '$DB_PASS';
    GRANT ALL PRIVILEGES ON $DB_NAME.* TO '$DB_USER'@'localhost';
    FLUSH PRIVILEGES;
    EOF

    echo ">>> Instalando Moodle via CLI..."
    php $MOODLE_DIR/admin/cli/install.php \
      --wwwroot="http://$DUCKDNS_DOMAIN.duckdns.org" \
      --dataroot=$MOODLE_DATA \
      --dbtype=mysqli \
      --dbhost=localhost \
      --dbname=$DB_NAME \
      --dbuser=$DB_USER \
      --dbpass=$DB_PASS \
      --adminuser=$ADMIN_USER \
      --adminpass=$ADMIN_PASS \
      --adminemail=$ADMIN_EMAIL \
      --fullname="Moodle Lab Staging" \
      --shortname="moodlelab" \
      --non-interactive \
      --agree-license

    echo ">>> Moodle instalado correctamente"

# Script de actualización de DuckDNS en cada arranque
- path: /opt/update-duckdns.sh
  permissions: '0755'
  content: |
    #!/bin/bash
    PUBLIC_IP=$(curl -s https://api.ipify.org)
    curl -s "https://www.duckdns.org/update?domains=${duckdns_domain}&token=${duckdns_token}&ip=$PUBLIC_IP"
    echo "DuckDNS actualizado con IP: $PUBLIC_IP"

# Servicio systemd para actualizar DuckDNS en cada arranque
- path: /etc/systemd/system/duckdns.service
  content: |
    [Unit]
    Description=Update DuckDNS on boot
    After=network-online.target
    Wants=network-online.target

    [Service]
    Type=oneshot
    ExecStart=/opt/update-duckdns.sh

    [Install]
    WantedBy=multi-user.target

runcmd:
# Activar sitio Nginx
- ln -sf /etc/nginx/sites-available/moodle /etc/nginx/sites-enabled/moodle
- rm -f /etc/nginx/sites-enabled/default
- nginx -t
- systemctl restart nginx
- systemctl enable nginx

# Configurar PHP-FPM
- systemctl enable php8.3-fpm
- systemctl restart php8.3-fpm

# Configurar MySQL
- systemctl enable mysql
- systemctl start mysql

# Activar servicio DuckDNS y actualizar IP antes de instalar Moodle
- systemctl daemon-reload
- systemctl enable duckdns
- systemctl start duckdns

# Esperar que DuckDNS se actualice
- sleep 15

# Ejecutar instalación de Moodle
- /opt/install-moodle.sh >> /var/log/moodle-install.log 2>&1

# Reiniciar Nginx final
- systemctl restart nginx
