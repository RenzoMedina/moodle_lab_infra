#cloud-config

package_update: true
package_upgrade: false

packages:
- nginx
- mysql-server
- git
- unzip
- curl
- software-properties-common

write_files:
- path: /etc/nginx/sites-available/moodle
  content: |
    server {
      listen 80;
      server_name ${duckdns_domain}.duckdns.org;
      root /var/www/moodle;
      index index.php;

      client_max_body_size 100M;

      location / {
        try_files $uri $uri/ /index.php?$query_string;
      }


     location ~ ^(.+\.php)(.*)$ {
        fastcgi_split_path_info ^(.+\.php)(.*)$;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 300;
    }

      location ~ /\.ht {
        deny all;
      }
    }

- path: /opt/update-duckdns.sh
  permissions: '0755'
  content: |
    #!/bin/bash
    PUBLIC_IP=$(curl -s https://api.ipify.org)
    curl -s "https://www.duckdns.org/update?domains=${duckdns_domain}&token=${duckdns_token}&ip=$PUBLIC_IP"
    echo "DuckDNS actualizado con IP: $PUBLIC_IP"

- path: /etc/systemd/system/duckdns.service
  content: |
    [Unit]
    Description=Update DuckDNS on boot
    After=network-online.target
    Wants=network-online.target

    [Service]
    Type=oneshot
    ExecStart=/opt/update-duckdns.sh

    [Install]
    WantedBy=multi-user.target

runcmd:
# Agregar repositorio PHP de Ondrej, instalar PHP 8.1,extension y configurar PHP-FPM
- echo "[LOG] Instalando PHP 8.1 y extensiones" | tee -a /var/log/cloud-init-moodle.log
- DEBIAN_FRONTEND=noninteractive apt-get install -y php8.1 php8.1-fpm php8.1-mysql php8.1-xml php8.1-mbstring php8.1-curl php8.1-zip php8.1-gd php8.1-intl php8.1-soap php8.1-opcache php8.1-xmlrpc >> /var/log/cloud-init-moodle.log 2>&1

# Configurar PHP-FPM para Moodle
- echo "[LOG] Configurando PHP" | tee -a /var/log/cloud-init-moodle.log
- echo "max_input_vars = 5000" >> /etc/php/8.1/fpm/php.ini
- echo "max_input_vars = 5000" >> /etc/php/8.1/cli/php.ini
- systemctl enable php8.1-fpm
- systemctl restart php8.1-fpm

# Verificar instalación de PHP 8.1
- echo "[LOG] Verificando PHP 8.1" | tee -a /var/log/cloud-init-moodle.log
- /usr/bin/php8.1 --version >> /var/log/cloud-init-moodle.log 2>&1 || echo "[ERROR] PHP 8.1 no instalado" | tee -a /var/log/cloud-init-moodle.log

# Configurar Nginx
- echo "[LOG] Configurando Nginx" | tee -a /var/log/cloud-init-moodle.log
- ln -sf /etc/nginx/sites-available/moodle /etc/nginx/sites-enabled/moodle
- rm -f /etc/nginx/sites-enabled/default
- nginx -t >> /var/log/cloud-init-moodle.log 2>&1
- systemctl enable nginx
- systemctl restart nginx

# Configurar MySQL
- echo "[LOG] Configurando MySQL" | tee -a /var/log/cloud-init-moodle.log
- systemctl enable mysql
- systemctl start mysql
- mysql -u root -e "CREATE DATABASE IF NOT EXISTS ${moodle_db_user} DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;" >> /var/log/cloud-init-moodle.log 2>&1
- mysql -u root -e "CREATE USER IF NOT EXISTS '${moodle_db_user}'@'localhost' IDENTIFIED BY '${moodle_db_password}';" >> /var/log/cloud-init-moodle.log 2>&1
- mysql -u root -e "GRANT ALL PRIVILEGES ON ${moodle_db_name}.* TO '${moodle_db_user}'@'localhost';" >> /var/log/cloud-init-moodle.log 2>&1
- mysql -u root -e "FLUSH PRIVILEGES;" >> /var/log/cloud-init-moodle.log 2>&1

# Activar DuckDNS
- echo "[LOG] Activando DuckDNS" | tee -a /var/log/cloud-init-moodle.log
- systemctl daemon-reload
- systemctl enable duckdns
- systemctl start duckdns
- sleep 15

# Clonar Moodle
- |
  if [ ! -d /var/www/moodle ]; then
    echo "[LOG] Clonando Moodle" | tee -a /var/log/cloud-init-moodle.log
    git clone --recurse-submodules --branch ${moodle_branch} https://github.com/RenzoMedina/moodle-lab.git /var/www/moodle >> /var/log/cloud-init-moodle.log 2>&1
  else
    echo "[LOG] /var/www/moodle ya existe, se omite el clone." | tee -a /var/log/cloud-init-moodle.log
  fi

# Permisos previos a la instalación
- echo "[LOG] Creando moodledata y ajustando permisos" | tee -a /var/log/cloud-init-moodle.log
- mkdir -p /var/moodledata
- chown -R www-data:www-data /var/moodledata
- find /var/moodledata -type d -exec chmod 770 {} \;
- find /var/moodledata -type f -exec chmod 660 {} \;
- chown -R www-data:www-data /var/www/moodle
- find /var/www/moodle -type d -exec chmod 755 {} \;
- find /var/www/moodle -type f -exec chmod 644 {} \;

# Configurar MySQL
- echo "[LOG] Configurando base de datos Moodle" | tee -a /var/log/cloud-init-moodle.log
- mysql -u root -e "CREATE DATABASE IF NOT EXISTS ${moodle_db_name} DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;" >> /var/log/cloud-init-moodle.log 2>&1
- mysql -u root -e "CREATE USER IF NOT EXISTS '${moodle_db_user}'@'localhost' IDENTIFIED BY '${moodle_db_password}';" >> /var/log/cloud-init-moodle.log 2>&1
- mysql -u root -e "GRANT ALL PRIVILEGES ON ${moodle_db_name}.* TO '${moodle_db_user}'@'localhost';" >> /var/log/cloud-init-moodle.log 2>&1
- mysql -u root -e "FLUSH PRIVILEGES;" >> /var/log/cloud-init-moodle.log 2>&1

# Forzar wizard de instalación SOLO si es una instalación nueva
- |
  if [ ! -f /var/www/moodle/config.php ]; then
    echo "[LOG] No existe config.php, esta es una instalación nueva. Forzando wizard." | tee -a /var/log/cloud-init-moodle.log
    mysql -u root -e "DROP DATABASE IF EXISTS ${moodle_db_name}; CREATE DATABASE ${moodle_db_name} DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;" >> /var/log/cloud-init-moodle.log 2>&1
  else
    echo "[LOG] config.php ya existe, se preserva la instalación actual (no se toca la base de datos)." | tee -a /var/log/cloud-init-moodle.log
  fi

# Permisos finales
- echo "[LOG] Ajustando permisos finales" | tee -a /var/log/cloud-init-moodle.log
- chown -R www-data:www-data /var/www/moodle
- chmod -R 755 /var/www/moodle
- chown www-data:www-data /var/www/moodle/config.php
- chmod 644 /var/www/moodle/config.php

# Configurar PHP para Moodle
- echo "[LOG] Configurando PHP para Moodle" | tee -a /var/log/cloud-init-moodle.log
- sed -i 's/upload_max_filesize = .*/upload_max_filesize = 50M/' /etc/php/8.1/fpm/php.ini
- sed -i 's/post_max_size = .*/post_max_size = 50M/' /etc/php/8.1/fpm/php.ini
- sed -i 's/memory_limit = .*/memory_limit = 256M/' /etc/php/8.1/fpm/php.ini
- sed -i 's/max_execution_time = .*/max_execution_time = 300/' /etc/php/8.1/fpm/php.ini
- sed -i 's/max_input_time = .*/max_input_time = 300/' /etc/php/8.1/fpm/php.ini

# Reiniciar servicios
- echo "[LOG] Reiniciando servicios" | tee -a /var/log/cloud-init-moodle.log
- systemctl restart php8.1-fpm
- systemctl restart nginx

- echo "[LOG] Instalación completada" | tee -a /var/log/cloud-init-moodle.log
