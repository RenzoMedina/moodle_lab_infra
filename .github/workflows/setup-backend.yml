name: Setup Terraform Backend

on:
  workflow_dispatch:


jobs:
  setup-backend:
    runs-on: ubuntu-latest
    steps:
    # Checkout the repository
    - name: Az login
      uses: azure/login@v1
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }
    # Create resource group, storage account and storage container for tfstate
    - name: Create resource group to tfstate
      run: |
        az group create \ 
        --name ${{ secrets.AZURE_RESOURCE_GROUP }} \
        --location ${{ secrets.AZURE_REGION }}
    # Create storage account and storage container for tfstate
    - name: Create storage account to tfstate
      run: |
        az storage account create \
        --name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
        --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
        --location ${{ secrets.AZURE_REGION }} \
        --sku Standard_LRS
    # Create storage container and blob for tfstate
    - name: Create storage container to tfstate
      run: |
        az storage container create \
        --name ${{ secrets.AZURE_STORAGE_CONTAINER }} \
        --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
