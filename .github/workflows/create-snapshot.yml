name: Create Staging Snapshot

on:
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Az login
        uses: azure/login@v3
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Create snapshot of staging database
        run: |
          # El snapshot vive en su PROPIO resource group (persistente),
          # separado del RG que Terraform destruye. Por eso usamos el
          # resource ID completo del disco como --source, no solo el nombre:
          DISK_ID=$(az disk show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP_VM }} \
            --name ${{ secrets.AZURE_DISK_NAME }} \
            --query id -o tsv)
      
            az snapshot create \
              --name ${{ secrets.AZURE_SNAPSHOT_NAME }} \
              --resource-group ${{ secrets.AZURE_SNAPSHOT_RESOURCE_GROUP }} \
              --source "$DISK_ID" \
              --location ${{ secrets.AZURE_REGION }}
            echo "Snapshot created successfully in $AZURE_SNAPSHOT_RESOURCE_GROUP"
