name: Create Staging Snapshot

on:
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Az login
        uses: azure/login@v3
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Create snapshot of staging database
        run: |
          az snapshot create \
            --name ${{ secrets.AZURE_SNAPSHOT_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP_VM }} \
            --source ${{ secrets.AZURE_DISK_NAME }} \
            --location ${{ secrets.AZURE_REGION }}
          echo "Snapshot created successfully"
